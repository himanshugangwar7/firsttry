<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Todo - Organize with Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Welcome Back</h2>
            <form id="auth-form">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Username" required autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                </div>
                <button type="submit" id="auth-submit-btn" class="primary-btn">Login</button>
            </form>
            <p class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span>
                <button id="toggle-auth-btn" class="text-link">Sign Up</button>
            </p>
        </div>
    </div>

    <main class="app-container" id="app-container" style="display: none;">
        <header class="app-header">
            <div class="header-top">
                <h1>Stay Focused</h1>
                <button id="logout-btn" class="logout-btn" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="What's on your mind?" autocomplete="off">
                <button id="add-btn" aria-label="Add Task">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </section>

        <section class="list-section">
            <div class="stats-bar">
                <span id="task-count">0 tasks</span>
                <button id="clear-completed" class="text-btn">Clear Completed</button>
            </div>
            <ul id="todo-list"></ul>
        </section>
    </main>

    <script type="module" src="/main.js"></script>
</body>
</html>
