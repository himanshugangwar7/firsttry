<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Todo - Organize with Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="app-container">
        <header class="app-header">
            <h1>Stay Focused</h1>
            <p id="date-display"></p>
        </header>

        <section class="input-section">
            <div class="input-wrapper">
                <input type="text" id="todo-input" placeholder="What's on your mind?" autocomplete="off">
                <button id="add-btn" aria-label="Add Task">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </section>

        <section class="list-section">
            <div class="stats-bar">
                <span id="task-count">0 tasks</span>
                <button id="clear-completed" class="text-btn">Clear Completed</button>
            </div>
            <ul id="todo-list"></ul>
        </section>
    </main>

    <script type="module" src="/main.js"></script>
</body>
</html>
